<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #212121;
            --bg-secondary: #2f2f2f;
            --bg-tertiary: #3f3f3f;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --accent: #10a37f;
            --accent-hover: #1a7f64;
            --border: #4f4f4f;
            --user-bg: #2f2f2f;
            --assistant-bg: transparent;
            --code-bg: #1e1e1e;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background-color: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .new-chat-btn:hover {
            background-color: var(--bg-tertiary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .sidebar-section {
            margin-bottom: 16px;
        }

        .sidebar-section-title {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 8px 12px;
            font-weight: 600;
        }

        .stats-card {
            background-color: var(--bg-tertiary);
            border-radius: 8px;
            padding: 12px;
            margin: 8px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }

        .stats-label {
            color: var(--text-secondary);
        }

        .stats-value {
            color: var(--accent);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 100%;
        }

        .header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-title svg {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            padding: 8px 16px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background-color: var(--border);
        }

        .header-btn.primary {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .header-btn.primary:hover {
            background-color: var(--accent-hover);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
        }

        .chat-messages {
            max-width: 768px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .message {
            padding: 24px 0;
            display: flex;
            gap: 16px;
        }

        .message.user {
            background-color: var(--user-bg);
            margin: 0 -24px;
            padding-left: 24px;
            padding-right: 24px;
            border-radius: 12px;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background-color: var(--accent);
            color: white;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #10a37f, #1a7f64);
            color: white;
        }

        .message-content {
            flex: 1;
            min-width: 0;
            line-height: 1.7;
        }

        .message-content p {
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul, .message-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin-bottom: 8px;
        }

        .message-content code {
            background-color: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }

        .message-content pre {
            background-color: var(--code-bg);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .message-content pre code {
            padding: 0;
            background: none;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            margin: 20px 0 12px 0;
            font-weight: 600;
        }

        .message-content h1 { font-size: 1.5em; }
        .message-content h2 { font-size: 1.3em; }
        .message-content h3 { font-size: 1.1em; }

        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }

        .message-content th, .message-content td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        .message-content th {
            background-color: var(--bg-tertiary);
        }

        .sources-container {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .sources-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .source-item {
            background-color: var(--bg-tertiary);
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            max-height: 80px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }

        .source-item:hover {
            background-color: var(--border);
        }

        .source-item.expanded {
            max-height: none;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Input Area */
        .input-container {
            padding: 16px 24px 24px;
            background-color: var(--bg-primary);
        }

        .input-wrapper {
            max-width: 768px;
            margin: 0 auto;
            position: relative;
        }

        .input-box {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 48px 12px 16px;
            display: flex;
            align-items: flex-end;
        }

        .input-box:focus-within {
            border-color: var(--accent);
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 200px;
            line-height: 1.5;
        }

        #message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            width: 32px;
            height: 32px;
            background-color: var(--accent);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background-color: var(--accent-hover);
        }

        .send-btn:disabled {
            background-color: var(--bg-tertiary);
            cursor: not-allowed;
        }

        .send-btn svg {
            color: white;
        }

        .input-footer {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Welcome Screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .welcome-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #10a37f, #1a7f64);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .welcome-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 32px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 600px;
        }

        .suggestion-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-card:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--accent);
        }

        .suggestion-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .suggestion-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Upload Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background-color: rgba(16, 163, 127, 0.1);
        }

        .upload-area.dragover {
            border-color: var(--accent);
            background-color: rgba(16, 163, 127, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background-color: var(--accent-hover);
        }

        .upload-btn:disabled {
            background-color: var(--bg-tertiary);
            cursor: not-allowed;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .suggestions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-section">
                <div class="sidebar-section-title">KNOWLEDGE BASE</div>
                <div class="stats-card">
                    <div class="stats-row">
                        <span class="stats-label">Nodes</span>
                        <span class="stats-value" id="stats-nodes">0</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Edges</span>
                        <span class="stats-value" id="stats-edges">0</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Sessions</span>
                        <span class="stats-value" id="stats-sessions">0</span>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <div class="header-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
                Chat QA
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="openUploadModal()">
                    📄 Upload PDF
                </button>
                <button class="header-btn" onclick="clearDatabase()">
                    🗑️ Clear DB
                </button>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="chat-container" id="chat-container">
            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h1 class="welcome-title">Chat QA</h1>
                <p class="welcome-subtitle">Ask questions about algorithms</p>
            </div>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chat-messages" style="display: none;"></div>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea 
                        id="message-input" 
                        placeholder="Ask a question about your knowledge base..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    GraphRAG uses your uploaded documents to answer questions
                </div>
            </div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="upload-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Upload PDF Document</h3>
                <button class="modal-close" onclick="closeUploadModal()">&times;</button>
            </div>
            <div 
                class="upload-area" 
                id="upload-area"
                onclick="document.getElementById('file-input').click()"
            >
                <div class="upload-icon">📄</div>
                <div class="upload-text">
                    <strong>Click to upload</strong> or drag and drop<br>
                    PDF files only
                </div>
                <div id="selected-file" style="margin-top: 12px; color: var(--accent);"></div>
            </div>
            <input type="file" id="file-input" accept=".pdf" style="display: none;" onchange="handleFileSelect(event)">
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Start Page</label>
                    <input type="number" class="form-input" id="start-page" value="0" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label">End Page (-1 = all)</label>
                    <input type="number" class="form-input" id="end-page" value="-1" min="-1">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" id="clear-existing">
                    Clear existing data before upload
                </label>
            </div>
            
            <button class="upload-btn" id="upload-btn" onclick="uploadFile()" disabled>
                Upload & Process
            </button>
        </div>
    </div>

    <script>
        let sessionId = null;
        let selectedFile = null;
        let isStreaming = false;

        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('stats-nodes').textContent = data.nodes || 0;
                document.getElementById('stats-edges').textContent = data.edges || 0;
                document.getElementById('stats-sessions').textContent = data.active_sessions || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function newChat() {
            sessionId = null;
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('chat-messages').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'flex';
        }

        function askSuggestion(question) {
            document.getElementById('message-input').value = question;
            sendMessage();
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message || isStreaming) return;
            
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('chat-messages').style.display = 'block';
            
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            isStreaming = true;
            document.getElementById('send-btn').disabled = true;
            
            const assistantDiv = addMessage('assistant', '', true);
            
            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        top_k: 5,
                        use_graph: true,
                        response_style: 'detailed'
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullAnswer = '';
                let sources = [];

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'session') {
                                    sessionId = data.session_id;
                                } else if (data.type === 'sources') {
                                    sources = data.sources;
                                } else if (data.type === 'token') {
                                    fullAnswer += data.content;
                                    updateAssistantMessage(assistantDiv, fullAnswer, sources, true);
                                } else if (data.type === 'done') {
                                    updateAssistantMessage(assistantDiv, data.full_answer, sources, false);
                                } else if (data.type === 'error') {
                                    updateAssistantMessage(assistantDiv, 'Error: ' + data.message, [], false);
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                updateAssistantMessage(assistantDiv, 'Error: ' + error.message, [], false);
            }

            isStreaming = false;
            document.getElementById('send-btn').disabled = false;
            loadStats();
        }

        function addMessage(role, content, isStreaming = false) {
            const messagesDiv = document.getElementById('chat-messages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'U' : 'G';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (isStreaming) {
                contentDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            } else {
                contentDiv.innerHTML = marked.parse(content);
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            scrollToBottom();
            
            return messageDiv;
        }

        function updateAssistantMessage(messageDiv, content, sources, isStreaming) {
            const contentDiv = messageDiv.querySelector('.message-content');
            
            let html = marked.parse(content);
            
            if (!isStreaming && sources && sources.length > 0) {
                html += '<div class="sources-container">';
                html += '<div class="sources-title">📚 Sources</div>';
                sources.forEach((source, i) => {
                    const truncated = source.length > 150 ? source.substring(0, 150) + '...' : source;
                    html += `<div class="source-item" onclick="this.classList.toggle('expanded')">${escapeHtml(truncated)}</div>`;
                });
                html += '</div>';
            }
            
            contentDiv.innerHTML = html;
            
            contentDiv.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        function openUploadModal() {
            document.getElementById('upload-modal').classList.add('active');
        }

        function closeUploadModal() {
            document.getElementById('upload-modal').classList.remove('active');
            selectedFile = null;
            document.getElementById('selected-file').textContent = '';
            document.getElementById('upload-btn').disabled = true;
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                document.getElementById('selected-file').textContent = selectedFile.name;
                document.getElementById('upload-btn').disabled = false;
            }
        }

        const uploadArea = document.getElementById('upload-area');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].name.endsWith('.pdf')) {
                selectedFile = files[0];
                document.getElementById('selected-file').textContent = selectedFile.name;
                document.getElementById('upload-btn').disabled = false;
            }
        });

        async function uploadFile() {
            if (!selectedFile) return;
            
            const uploadBtn = document.getElementById('upload-btn');
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Processing...';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('start_page', document.getElementById('start-page').value);
            formData.append('end_page', document.getElementById('end-page').value);
            formData.append('clear_existing', document.getElementById('clear-existing').checked);
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert(`✅ Upload successful!\nNodes added: ${data.nodes_added}\nEdges added: ${data.edges_added}`);
                    closeUploadModal();
                    loadStats();
                } else {
                    alert('❌ Error: ' + data.message);
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
            
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Upload & Process';
        }

        async function clearDatabase() {
            if (!confirm('Are you sure you want to clear all data?')) return;
            
            try {
                const response = await fetch('/api/clear', { method: 'POST' });
                const data = await response.json();
                alert('✅ Database cleared');
                loadStats();
                newChat();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        loadStats();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
